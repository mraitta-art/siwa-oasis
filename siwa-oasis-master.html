<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SIWA OASIS - Complete Marketplace Platform</title>
    <meta name="description"
        content="Discover Siwa Oasis - Hotels, restaurants, tours, shops and experiences in Egypt's most magical desert oasis">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f3f4f6;
            color: #1f2937;
            line-height: 1.5
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem
        }

        .card {
            background: #fff;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .1);
            transition: all .2s
        }

        .card:hover {
            box-shadow: 0 4px 12px rgba(0, 0, 0, .1)
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            padding-bottom: .75rem;
            border-bottom: 1px solid #e5e7eb;
            flex-wrap: wrap;
            gap: 1rem
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.25rem
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.25rem
        }

        @media(max-width:768px) {

            .grid-2,
            .grid-3,
            .grid-4 {
                grid-template-columns: 1fr
            }

            .admin-wrapper,
            .vendor-wrapper {
                grid-template-columns: 1fr !important
            }

            .admin-sidebar,
            .vendor-sidebar {
                position: static !important
            }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .5rem 1rem;
            font-weight: 500;
            border-radius: .5rem;
            border: none;
            cursor: pointer;
            transition: all .2s;
            font-size: .875rem
        }

        .btn-primary {
            background: #D4AF37;
            color: #1a1a2e
        }

        .btn-primary:hover {
            background: #c4a030;
            transform: translateY(-1px)
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #d1d5db;
            color: #4b5563
        }

        .btn-outline:hover {
            border-color: #D4AF37;
            color: #D4AF37
        }

        .btn-danger {
            background: #ef4444;
            color: #fff
        }

        .btn-success {
            background: #10b981;
            color: #fff
        }

        .btn-sm {
            padding: .375rem .75rem;
            font-size: .75rem
        }

        .btn-xs {
            padding: .25rem .5rem;
            font-size: .7rem
        }

        .form-group {
            margin-bottom: 1rem
        }

        .form-label {
            display: block;
            margin-bottom: .5rem;
            font-weight: 500;
            font-size: .875rem;
            color: #374151
        }

        .form-label.required::after {
            content: "*";
            color: #ef4444;
            margin-left: .25rem
        }

        .form-control {
            width: 100%;
            padding: .5rem .75rem;
            border: 1px solid #d1d5db;
            border-radius: .5rem;
            font-size: .875rem;
            transition: all .2s
        }

        .form-control:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, .15)
        }

        .form-control.is-invalid {
            border-color: #ef4444;
            box-shadow: 0 0 0 2px rgba(239, 68, 68, .15)
        }

        .form-control.is-valid {
            border-color: #10b981
        }

        .invalid-feedback {
            color: #ef4444;
            font-size: .75rem;
            margin-top: .25rem;
            display: none
        }

        .is-invalid~.invalid-feedback {
            display: block
        }

        .tabs {
            display: flex;
            gap: .25rem;
            background: #fff;
            padding: .5rem;
            border-radius: 2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .1)
        }

        .tab {
            padding: .5rem 1rem;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 500;
            border-radius: 1.5rem;
            transition: all .2s
        }

        .tab:hover {
            background: #f3f4f6
        }

        .tab.active {
            background: #D4AF37;
            color: #1a1a2e
        }

        .tab-content {
            display: none;
            animation: fadeIn .2s
        }

        .tab-content.active {
            display: block
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem
        }

        .stat {
            background: #fff;
            padding: 1rem;
            border-radius: .75rem;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .1)
        }

        .stat:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .1)
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #D4AF37
        }

        .stat-label {
            font-size: .75rem;
            color: #6b7280
        }

        @media(max-width:768px) {
            .stats {
                grid-template-columns: repeat(2, 1fr)
            }
        }

        .badge {
            display: inline-block;
            padding: .25rem .5rem;
            font-size: .7rem;
            font-weight: 600;
            border-radius: 9999px
        }

        .badge-parent {
            background: #8b5cf6;
            color: #fff
        }

        .badge-child {
            background: #3b82f6;
            color: #fff
        }

        .badge-success {
            background: #10b981;
            color: #fff
        }

        .badge-warning {
            background: #f59e0b;
            color: #fff
        }

        .badge-info {
            background: #3b82f6;
            color: #fff
        }

        .badge-danger {
            background: #ef4444;
            color: #fff
        }

        .subscription-badge {
            background: #8b5cf6;
            color: #fff;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: .7rem
        }

        .tree {
            margin-left: 1rem;
            padding-left: 1rem;
            border-left: 2px solid #D4AF37
        }

        .tree-item {
            padding: .5rem 0;
            display: flex;
            align-items: center;
            gap: .5rem;
            flex-wrap: wrap
        }

        .tree-parent {
            font-weight: 600
        }

        .builder-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 1.5rem
        }

        .field-library {
            background: #f9fafb;
            border-radius: .75rem;
            padding: 1rem;
            max-height: 70vh;
            overflow-y: auto
        }

        .field-category {
            margin-bottom: 1rem
        }

        .field-category-title {
            font-size: .75rem;
            font-weight: 600;
            color: #D4AF37;
            margin-bottom: .5rem;
            padding-bottom: .25rem;
            border-bottom: 1px solid #e5e7eb
        }

        .field-type {
            padding: .5rem;
            margin: .25rem 0;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: .5rem;
            cursor: grab;
            display: flex;
            align-items: center;
            gap: .5rem;
            font-size: .8rem;
            transition: all .2s
        }

        .field-type:hover {
            border-color: #D4AF37;
            transform: translateX(4px);
            background: #fffacd
        }

        .dropzone {
            border: 2px dashed #d1d5db;
            border-radius: .75rem;
            padding: 1rem;
            min-height: 200px;
            background: #f9fafb;
            transition: all .2s
        }

        .dropzone.drag-over {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, .05)
        }

        .builder-field {
            background: #fff;
            padding: .75rem;
            margin-bottom: .5rem;
            border-radius: .5rem;
            border: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all .2s
        }

        .builder-field:hover {
            box-shadow: 0 1px 3px rgba(0, 0, 0, .1);
            border-color: #D4AF37
        }

        .section-container {
            border: 1px solid #e5e7eb;
            border-radius: .75rem;
            margin-bottom: 1rem;
            overflow: hidden
        }

        .section-header {
            background: #f9fafb;
            padding: .75rem 1rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600
        }

        .section-fields {
            min-height: 120px;
            padding: 1rem;
            background: #fafafa
        }

        .admin-wrapper,
        .vendor-wrapper {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 1.5rem
        }

        .admin-sidebar,
        .vendor-sidebar {
            background: #1a1a2e;
            border-radius: 1rem;
            padding: 1.25rem;
            color: #fff;
            height: fit-content;
            position: sticky;
            top: 1rem
        }

        .sidebar-title {
            color: #D4AF37;
            font-size: .75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 1rem;
            padding-bottom: .5rem;
            border-bottom: 1px solid rgba(255, 255, 255, .1);
            letter-spacing: 1px
        }

        .nav-item {
            padding: .75rem;
            cursor: pointer;
            border-radius: .5rem;
            margin: .25rem 0;
            display: flex;
            align-items: center;
            gap: .75rem;
            transition: all .2s;
            font-size: .9rem
        }

        .nav-item:hover {
            background: rgba(212, 175, 55, .2);
            color: #D4AF37
        }

        .nav-item.active {
            background: rgba(212, 175, 55, .3);
            color: #D4AF37;
            font-weight: 600
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem
        }

        .modal-content {
            background: #fff;
            border-radius: 1rem;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.5rem
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: .75rem;
            border-bottom: 1px solid #e5e7eb
        }

        .toast {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            padding: .75rem 1rem;
            border-radius: .5rem;
            color: #fff;
            font-size: .875rem;
            z-index: 1100;
            animation: slideIn .3s;
            display: flex;
            align-items: center;
            gap: .5rem
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0
            }

            to {
                transform: translateX(0);
                opacity: 1
            }
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            color: #D4AF37
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(212, 175, 55, .2);
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* UNIFIED PREVIEW SYSTEM */
        .preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            color: #fff;
            animation: fadeIn .3s;
        }

        .preview-toolbar {
            background: #111827;
            padding: .75rem 1.25rem;
            border-bottom: 1px solid #374151;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-tabs-bar {
            display: flex;
            gap: .25rem;
        }

        .preview-tab-btn {
            padding: .5rem 1.25rem;
            background: transparent;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: .85rem;
            border-radius: .5rem;
            transition: all .2s;
        }

        .preview-tab-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .preview-tab-btn.active {
            background: #D4AF37;
            color: #1a1a2e;
            font-weight: 600;
        }

        .preview-body {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1rem;
            background: #f3f4f6;
            color: #1a1a2e;
        }

        .preview-pane {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            animation: slideInUp .4s;
        }

        .preview-website-shell {
            width: 100%;
            background: #fff;
            border-radius: .75rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            min-height: 800px;
        }

        .preview-minisite-shell {
            width: 400px;
            background: #fff;
            border-radius: 1.5rem;
            border: 8px solid #111827;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            min-height: 700px;
        }

        @keyframes slideInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .policy-indicator {
            background: #fefce8;
            border-left: 3px solid #D4AF37;
            padding: .5rem .75rem;
            margin-bottom: 1rem;
            border-radius: 0 .5rem .5rem 0;
            font-size: .8rem;
        }

        .help-text {
            font-size: .7rem;
            color: #6b7280;
            margin-top: .25rem;
            display: block
        }

        .feature-cascade {
            border-left: 3px solid #D4AF37;
            padding-left: 12px;
            margin: 10px 0;
            background: #fefce8;
            padding: .75rem;
            border-radius: 0 .5rem .5rem 0
        }

        .notification-banner {
            background: #e0f2fe;
            padding: .75rem 1rem;
            border-radius: .5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .5rem;
            font-size: .9rem
        }

        .live-preview {
            border: 2px solid #D4AF37;
            background: #fafafa;
            padding: 1rem;
            border-radius: .75rem;
            margin-top: 1rem
        }

        .live-preview h4 {
            color: #D4AF37;
            margin-bottom: .75rem
        }

        .permission-matrix {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: .5rem
        }

        .permission-item {
            background: #f9fafb;
            padding: .5rem;
            border-radius: .5rem;
            display: flex;
            align-items: center;
            gap: .5rem;
            font-size: .8rem
        }

        .audit-row {
            padding: .5rem 0;
            border-bottom: 1px solid #f3f4f6;
            font-size: .85rem;
            display: flex;
            gap: 1rem;
            align-items: center
        }

        .audit-row .audit-time {
            color: #9ca3af;
            font-size: .75rem;
            min-width: 140px
        }

        .audit-row .audit-user {
            color: #3b82f6;
            font-weight: 500;
            min-width: 120px
        }

        /* ===== UNIFIED PREVIEW ENGINE ===== */
        .preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(6px);
            z-index: 1200;
            display: flex;
            flex-direction: column;
            animation: fadeIn .25s
        }

        .preview-toolbar {
            background: #1a1a2e;
            color: #fff;
            padding: .75rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: .75rem
        }

        .preview-toolbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap
        }

        .preview-toolbar-right {
            display: flex;
            align-items: center;
            gap: .5rem
        }

        .preview-tabs-bar {
            display: flex;
            gap: 2px;
            background: #2d2d44;
            padding: 4px;
            border-radius: 0
        }

        .preview-tab-btn {
            padding: .5rem 1.25rem;
            border: none;
            background: transparent;
            color: #9ca3af;
            cursor: pointer;
            font-weight: 600;
            font-size: .85rem;
            transition: all .2s;
            white-space: nowrap
        }

        .preview-tab-btn:hover {
            color: #fff;
            background: rgba(212, 175, 55, .15)
        }

        .preview-tab-btn.active {
            background: #D4AF37;
            color: #1a1a2e;
            border-radius: 4px
        }

        .preview-body {
            flex: 1;
            overflow: hidden;
            display: flex;
            background: #f3f4f6
        }

        .preview-pane {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem
        }

        .preview-pane-form {
            max-width: 720px;
            margin: 0 auto
        }

        .preview-pane-visual {
            background: #fff;
            border-left: 2px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
            overflow-y: auto
        }

        .preview-card-shell {
            max-width: 380px;
            width: 100%;
            margin-bottom: 1.5rem
        }

        .preview-minisite-shell {
            width: 100%;
            max-width: 800px;
            border: 2px solid #e5e7eb;
            border-radius: .75rem;
            overflow: hidden;
            background: #fff
        }

        .preview-minisite-hero {
            background: linear-gradient(135deg, #1a1a2e, #2d2d44);
            color: #D4AF37;
            padding: 3rem 1.5rem;
            text-align: center
        }

        .preview-minisite-hero h2 {
            font-size: 1.75rem;
            margin-bottom: .5rem
        }

        .preview-minisite-body {
            padding: 1.5rem
        }

        .preview-minisite-footer {
            background: #1f2937;
            color: #9ca3af;
            padding: 1rem;
            text-align: center;
            font-size: .8rem
        }

        .preview-website-shell {
            width: 100%;
            max-width: 1000px;
            border: 2px solid #e5e7eb;
            border-radius: .75rem;
            overflow: hidden;
            background: #fff
        }

        .preview-save-banner {
            background: #ecfdf5;
            border: 1px solid #6ee7b7;
            padding: .75rem 1rem;
            border-radius: .5rem;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: .5rem;
            font-size: .85rem
        }

        @media(max-width:900px) {
            .preview-body {
                flex-direction: column
            }

            .preview-pane-visual {
                border-left: none;
                border-top: 2px solid #e5e7eb
            }
        }
    </style>
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Loading SIWA OASIS...</p>
    </div>
    <div id="app" style="display:none;"></div>

    <script>
        // ================================================================
        // MODULE 1: CONFIGURATION & CONSTANTS
        // ================================================================
        const ROLES = {
            super_admin: { level: 1, name: 'Super Admin', permissions: ['*'] },
            content_admin: { level: 2, name: 'Content Admin', permissions: ['manage_types', 'manage_sections', 'manage_forms', 'manage_cards', 'manage_website', 'manage_policies'] },
            sales_manager: { level: 3, name: 'Sales Manager', permissions: ['view_all_businesses', 'approve_upgrades', 'assign_tiers', 'create_businesses', 'view_sales_stats'] },
            support_agent: { level: 4, name: 'Support Agent', permissions: ['view_businesses', 'edit_contact_info'] },
            salesman: { level: 5, name: 'Salesman', permissions: ['create_free_businesses', 'submit_upgrades', 'view_own_clients'] },
            vendor: { level: 6, name: 'Vendor', permissions: ['manage_own_business', 'request_upgrades', 'upload_images'] },
            public: { level: 7, name: 'Public', permissions: ['browse', 'search', 'claim_businesses'] }
        };

        const FIELD_TYPES = {
            text: { name: 'Text Input', icon: 'fa-font', hasOptions: false },
            textarea: { name: 'Text Area', icon: 'fa-paragraph', hasOptions: false },
            email: { name: 'Email', icon: 'fa-envelope', hasOptions: false },
            tel: { name: 'Phone', icon: 'fa-phone', hasOptions: false },
            number: { name: 'Number', icon: 'fa-hashtag', hasOptions: false },
            url: { name: 'URL', icon: 'fa-link', hasOptions: false },
            select: { name: 'Dropdown', icon: 'fa-caret-down', hasOptions: true },
            checkbox_group: { name: 'Checkbox Group', icon: 'fa-check-double', hasOptions: true },
            radio_group: { name: 'Radio Buttons', icon: 'fa-dot-circle', hasOptions: true },
            date: { name: 'Date', icon: 'fa-calendar', hasOptions: false },
            time: { name: 'Time', icon: 'fa-clock', hasOptions: false },

        function adjustColor(hex, pct) {
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            r = Math.max(0, Math.min(255, r + Math.round(r * pct / 100)));
            g = Math.max(0, Math.min(255, g + Math.round(g * pct / 100)));
            b = Math.max(0, Math.min(255, b + Math.round(b * pct / 100)));

        const Validator = {
            validate(value, rules, label) {
                const errors = [];
                if (rules.required && (!value || !String(value).trim())) errors.push(`${label} is required`);
                if (value && rules.minLength && String(value).length < rules.minLength) errors.push(`${label} must be at least ${rules.minLength} characters`);
                if (value && rules.maxLength && String(value).length > rules.maxLength) errors.push(`${label} must be at most ${rules.maxLength} characters`);
                if (value && rules.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) errors.push(`${label} must be a valid email`);
                if (value && rules.url && !/^https?:\/\/.+/.test(value)) errors.push(`${label} must be a valid URL`);
                if (value && rules.regex) { try { if (!new RegExp(rules.regex).test(value)) errors.push(`${label} format is invalid`) } catch (e) { } }
                if (value && rules.min !== undefined && Number(value) < rules.min) errors.push(`${label} must be at least ${rules.min}`);
                if (value && rules.max !== undefined && Number(value) > rules.max) errors.push(`${label} must be at most ${rules.max}`);
                return errors;
            },
            validateField(input, rules, label) {
                const errs = this.validate(input.value, rules, label);
                const fb = input.nextElementSibling?.classList?.contains('invalid-feedback') ? input.nextElementSibling : null;
                if (errs.length) { input.classList.add('is-invalid'); input.classList.remove('is-valid'); if (fb) { fb.textContent = errs[0]; fb.style.display = 'block' } }
                else { input.classList.remove('is-invalid'); input.classList.add('is-valid'); if (fb) fb.style.display = 'none' }
                return errs;
            },
            validateForm(formId) {
                const form = document.getElementById(formId); if (!form) return [];
                const inputs = form.querySelectorAll('[data-validate]'); let allErrors = [];
                inputs.forEach(inp => {
                    const rules = JSON.parse(inp.dataset.validate || '{}');
                    const label = inp.dataset.label || inp.name || 'Field';
                    allErrors = allErrors.concat(this.validateField(inp, rules, label));
                });
                return allErrors;
            }
        };

        // ================================================================
        // MODULE 9: AUTHENTICATION
        // ================================================================
        function login(email, password) {
            const user = STORE.vendors.find(v => v.email === email && atob(v.password) === password && v.active);
            if (user) {
                currentUser = { role: user.role, email: user.email, businessId: user.businessId, permissions: ROLES[user.role]?.permissions || [], id: user.id };
                addActivity(`Login: ${email} (${user.role})`); addAudit('login', `${email} logged in`);
                closeModal(); showToast(`Welcome ${email}!`, 'success'); renderApp(); return true;
            }
            showToast('Invalid credentials', 'error'); return false;
        }
        function logout() { addActivity(`Logout: ${currentUser.email}`); currentUser = { role: 'public', email: null, businessId: null, permissions: [], id: null }; renderApp() }
        function showLoginModal() {
            showModal('Login to SIWA OASIS', `
            <div class="form-group"><label class="form-label">Email</label><input type="email" id="loginEmail" class="form-control" placeholder="super@siwa.com"></div>
            <div class="form-group"><label class="form-label">Password</label><input type="password" id="loginPass" class="form-control" placeholder="super123"></div>
            <div class="policy-indicator"><i class="fas fa-users"></i> Demo Accounts:<br>
            • super@siwa.com / super123 (Super Admin)<br>
            • content@siwa.com / content123 (Content Admin)<br>
            • salesmanager@siwa.com / sales123 (Sales Manager)<br>
            • salesman@siwa.com / salesman123 (Salesman)<br>
            • vendor@siwa.com / vendor123 (Vendor)</div>
        `, () => { const e = document.getElementById('loginEmail')?.value, p = document.getElementById('loginPass')?.value; if (e && p) login(e, p); else showToast('Enter email and password', 'error') });
        }

        // ================================================================
        // MODULE 10: RENDER DISPATCH
        // ================================================================
        function renderApp() {
            const r = currentUser.role;
            if (['super_admin', 'content_admin', 'sales_manager', 'support_agent'].includes(r)) renderAdminDashboard();
            else if (r === 'salesman') renderSalesmanDashboard();
            else if (r === 'vendor' && currentUser.businessId) renderVendorDashboard();
            else renderPublicView();
        }

        function renderPubCard(biz) {
            const type = STORE.businessTypes.find(t => t.id === biz.type);
            const policy = getPolicyForRole(currentUser.role || 'public');
            const allowed = policy.allowedFields.includes('*') ? null : policy.allowedFields;

            // 1. Fetch the strict Admin-defined Card Template for this specific Business Type
            const cardConfig = STORE.cardTemplates[biz.type] || { fields: ['description'] };
            let enforceFields = cardConfig.fields;

            // 2. Cross-reference with Role-Based Privacy Policy
            if (allowed) {
                enforceFields = enforceFields.filter(f => allowed.includes(f));
            }

            // 3. Render Header
            let h = `<div class="card" style="cursor:pointer;display:flex;flex-direction:column;height:100%" onclick="viewBizDetail('${biz.id}')">
                        <div style="background:linear-gradient(135deg,#1a1a2e,#2d2d44);height:80px;border-radius:.5rem .5rem 0 0;margin:-1.5rem -1.5rem 1rem;display:flex;align-items:center;justify-content:center;color:#D4AF37"><i class="${type ? type.icon : 'fas fa-image'}" style="font-size:2.5rem"></i></div>
                        <h4 style="margin-bottom:.25rem">${escapeHtml(biz.name)}</h4>`;

            if (type) {
                h += `<p style="font-size:.8rem;color:${type.iconColor || '#6b7280'};margin-bottom:1rem;font-weight:bold;border-bottom:1px solid #e5e7eb;padding-bottom:.5rem"><i class="${type.icon}"></i> ${type.name.toUpperCase()} <span class="subscription-badge" style="float:right">${biz.subscriptionTier || 'free'}</span></p>`;
            }

            h += `<div style="flex:1">`;

            // 4. Flatten custom data safely to extract requested fields
            const flatData = biz.customData ? Object.values(biz.customData).reduce((a, s) => ({ ...a, ...s }), {}) : {};

            // 5. Loop through exact fields Admin requested
            for (const f of enforceFields) {
                if (f === 'name') continue;
                let val = flatData[f];

                // Polyfill for hardcoded old stuff if missing
                if (!val) {
                    if (f === 'description') val = flatData.description || 'No description available.';
                    if (f === 'stars') val = flatData.stars;
                    if (f === 'cuisine') val = flatData.cuisine;
                    if (f === 'phone') val = flatData.phone;
                }

                if (val) {
                    if (typeof val === 'string' && val.length > 90) val = val.substring(0, 87) + '...';
                    h += `<div style="font-size:.8rem;margin:.5rem 0;display:flex;justify-content:space-between;align-items:center">
                            <strong style="color:#6b7280;text-transform:capitalize;margin-right:1rem">${f.replace(/_/g, ' ')}:</strong> 
                            <span style="color:#111827;text-align:right;font-weight:500">${escapeHtml(String(val))}</span>
                         </div>`;
                }
            }

            h += `</div>`;
            return h + `<button class="btn btn-sm btn-primary" style="margin-top:1rem;width:100%"><i class="fas fa-arrow-right"></i> View Details</button></div>`;
        }
        function pubDoSearch() {
            const q = (document.getElementById('pubSearch')?.value || '').toLowerCase();
            if (!q) { renderPublicView(); return; }

            const f = STORE.businesses.filter(b => {
                if (!b.published || b.status === 'hidden') return false;

                // Get all sections for this business type
                const sections = getSectionsForType(b.type);

                // Check if ANY searchable field (Layer: main) matches
                let match = false;
                for (const sId of sections) {
                    const fields = getFieldsForSection(b.type, sId);
                    const searchableFields = fields.filter(fld => fld.searchable && fld.searchStep === 'main');

                    for (const fld of searchableFields) {
                        const rawVal = b.customData?.[sId]?.[fld.name];
                        if (!rawVal) continue;

                        if (typeof rawVal === 'object') {
                            // Match if query is in any attribute key OR if query is 'high' and value is > 7, etc.
                            // For now, standard string match across keys and values
                            const stringified = JSON.stringify(rawVal).toLowerCase();
                            if (stringified.includes(q)) { match = true; break; }
                        } else {
                            if (String(rawVal).toLowerCase().includes(q)) { match = true; break; }
                        }
                    }
                    if (match) break;
                }

                // Always check business name as a fallback main component
                if (!match && b.name.toLowerCase().includes(q)) match = true;

                return match;
            });

            document.getElementById('pubGrid').innerHTML = f.map(b => renderPubCard(b)).join('') || '<p style="grid-column:1/-1;text-align:center">No results found for your search criteria.</p>';

            // Show packages if vibe/name matches
            const pkGrid = document.getElementById('pubPackageGrid');
            const pkSec = document.getElementById('pubPackageSection');
            const matchingPks = (STORE.experiencePackages || []).filter(p => (p.vibeLink || '').toLowerCase().includes(q) || p.name.toLowerCase().includes(q));
            if (q.length > 2 && matchingPks.length > 0) {
                pkSec.style.display = 'block';
                pkGrid.innerHTML = matchingPks.map(p => renderPackageCard(p)).join('');
            } else {
                pkSec.style.display = 'none';
            }

            STORE.analytics.searchQueries.unshift({ term: q, ts: new Date().toISOString(), results: f.length }); saveStore();
        }

        // --- Admin: Sections (Enhanced) ---
        function _secGetUsage(secId) {
            const used = [];
            STORE.businessTypes.forEach(bt => {
                const linked = bt.sections?.includes(secId) || bt.ownSections?.includes(secId);
                if (linked) {
                    const fieldCount = STORE.formTemplates[bt.id]?.[secId]?.length || 0;
                    used.push({ id: bt.id, name: bt.name, icon: bt.icon, color: bt.iconColor, fieldCount, isOwn: bt.ownSections?.includes(secId) });
                }
            });
            return used;
        }
        function renderAdminSections(c) {

            const shared = [], specific = [], orphan = [];
            allSecs.forEach(([id, s]) => {
                const usage = _secGetUsage(id);

        function previewFormTemplate(personaId = 'admin') {
            if (!currentFormBizId) { showToast('Select a Business Type first', 'error'); return; }

            if (currentFormBizId && currentFormSectionId) { saveFormFields(); }
            const typeDef = STORE.businessTypes.find(b => b.id === currentFormBizId);
            if (!typeDef) { showToast('Business Type not found', 'error'); return; }

            const role = getRoleFromPersona(personaId);
            const allSections = getSectionsForType(currentFormBizId);

            function buildPreviewHTML(pid) {
                const r = getRoleFromPersona(pid);
                let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
                            <h3 style="margin:0">Preview: ${escapeHtml(typeDef.name)}</h3>

                let hasVisible = false;
                for (const s of allSections) {
                    const secDef = STORE.sections[s];
                    if (!secDef) continue;
                    // Section visibility: admin sees all; public sees showOnPublic sections; others need vendorEditable
                    if (r === 'public' && secDef.showOnPublic === false) continue;
                    if (r !== 'admin' && r !== 'public' && !secDef.vendorEditable) continue;

                    const fields = STORE.formTemplates[currentFormBizId]?.[s] || [];
                    let fh = '';
                    for (const f of fields) {
                        // ACL check: fallback to showOnPublic if no ACL defined
                        let canRead, canWrite;
                        if (f.acl && f.acl.read) {
                            canRead = f.acl.read.includes(r) || r === 'admin';
                            canWrite = (f.acl.write || []).includes(r) || r === 'admin';
                        } else {
                            canRead = r === 'admin' || r === 'vendor' || r === 'salesman' || (r === 'public' && f.permissions?.showOnPublic !== false);
                            canWrite = r === 'admin' || (secDef.vendorEditable && (r === 'vendor' || r === 'salesman'));
                        }
                        if (!canRead) continue;

                        let inpH;
                        if (f.type === 'textarea') {
                            inpH = `<textarea class="form-control" rows="2" placeholder="(preview)" ${canWrite ? '' : 'disabled'}></textarea>`;
                        } else if (f.type === 'select' && f.options?.length) {
                            inpH = `<select class="form-control" ${canWrite ? '' : 'disabled'}>${f.options.map(o => `<option>${escapeHtml(o)}</option>`).join('')}</select>`;
                        } else if (f.type === 'checkbox_group' && f.options?.length) {
                            inpH = `<div>${f.options.map(o => `<label style="display:inline-block;margin-right:8px"><input type="checkbox" ${canWrite ? '' : 'disabled'}> ${escapeHtml(o)}</label>`).join('')}</div>`;
                        } else if (f.type === 'radio_group' && f.options?.length) {
                            inpH = `<div>${f.options.map(o => `<label style="display:inline-block;margin-right:8px"><input type="radio" name="prev_${f.name}" ${canWrite ? '' : 'disabled'}> ${escapeHtml(o)}</label>`).join('')}</div>`;
                        } else if (f.type === 'rating') {
                            inpH = `<select class="form-control" ${canWrite ? '' : 'disabled'}><option>--</option>${[1, 2, 3, 4, 5].map(n => `<option>${'★'.repeat(n)}</option>`).join('')}</select>`;
                        } else {

        function getSearchableFieldsForEngine(se) {
            let fields = [];
            fields.push({ id: 'sys_keyword', label: 'System: Global Text Keyword', isSys: true });
            if (se.targetType === 'business' || se.targetType === 'all') {
                fields.push({ id: 'sys_category', label: 'System: Business Category Dropdown', isSys: true });
            }
            if (se.targetType === 'package' || se.targetType === 'all') {
                fields.push({ id: 'sys_vibe', label: 'System: Package Vibe Dropdown', isSys: true });
            }

            if (se.targetType === 'business') {
                const typesToCheck = se.targetCategory === 'all'
                    ? STORE.businessTypes
                    : STORE.businessTypes.filter(t => t.id === se.targetCategory);

                typesToCheck.forEach(t => {
                    const allSecs = getSectionsForType(t.id);
                    allSecs.forEach(sId => {
                        const flds = getFieldsForSection(t.id, sId);
                        flds.forEach(f => {
                            if (f.searchable) {
                                const fullId = `custom_${t.id}_${sId}_${f.name}`;
                                if (!fields.find(existing => existing.id === fullId)) {
                                    fields.push({
                                        id: fullId,
                                        label: `[${t.name}] ${f.label}`,
                                        options: f.options || []
                                    });
                                }
                            }
                        });
                    });
                });
            }
            return fields;
        }

                    <button class="btn btn-outline" onclick="previewWebsiteTemplate('admin')"><i class="fas fa-eye"></i> Preview As...</button>

                <div id="minisiteManagerArea">

                    <div id="minisiteTemplateGrid">Loading Minisite Architecture...</div>
                    <div style="margin-top:1rem; padding-top:1rem; border-top:1px solid #e5e7eb; display:flex; gap:0.5rem">

        function renderComponentLibrary(q, targetId = 'compLibraryGrid') {
            const query = q.toLowerCase();
            const all = { ...COMPONENTS.header, ...COMPONENTS.body, ...COMPONENTS.footer };
            let h = '';

            const cats = { navigation: 'Navigation', media: 'Media & Gallery', content: 'Content & Info', interactive: 'Interactive' };

            Object.entries(cats).forEach(([cid, clabel]) => {
                const results = Object.entries(all).filter(([k, v]) => v.category === cid && (v.name.toLowerCase().includes(query) || clabel.toLowerCase().includes(query)));
                if (results.length) {
                    h += `<div style="grid-column:1/-1;font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6b7280;margin:10px 0 5px 0;border-bottom:1px solid #e5e7eb;padding-bottom:2px">${clabel}</div>`;
                    results.forEach(([k, v]) => {
                        h += `<div class="field-type" draggable="true" ondragstart="wbDragStart(event,'${k}')" ondragend="wbDragEnd(event)" title="${escapeHtml(v.name)}">
                                <i class="fas ${v.icon}" style="color:#D4AF37"></i> 
                                <span style="font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(v.name)}</span>
                              </div>`;
                    });
                }
            });

            // Generate Searching Manager Building Units from Data Sections
            let searchComps = [];
            Object.values(STORE.formTemplates || {}).forEach(biz => {
                Object.values(biz || {}).forEach(sec => {
                    (sec || []).forEach(f => {
                        if (f.searchable && !searchComps.find(x => x.id === 'search_' + f.name)) {
                            searchComps.push({ id: 'search_' + f.name, name: f.label + ' Filter', icon: 'fa-filter', originalType: f.type });
                        }
                    });
                });
            });
            Object.values(STORE.customExpressions || {}).forEach(e => {
                if (e.searchable && !searchComps.find(x => x.id === 'search_' + e.id)) {
                    searchComps.push({ id: 'search_' + e.id, name: e.name + ' Filter', icon: 'fa-filter', originalType: e.type });
                }
            });

            const srchFiltered = searchComps.filter(sc => sc.name.toLowerCase().includes(query) || "search building units".includes(query));
            if (srchFiltered.length) {
                h += `<div style="grid-column:1/-1;font-size:.7rem;font-weight:700;text-transform:uppercase;color:#0284c7;margin:10px 0 5px 0;border-bottom:1px solid #bae6fd;padding-bottom:2px">Searching Manager Units <i class="fas fa-search"></i></div>`;
                srchFiltered.forEach(sc => {
                    h += `<div class="field-type" style="background:#e0f2fe;border-color:#bae6fd" draggable="true" ondragstart="wbDragStart(event,'${sc.id}', true)" ondragend="wbDragEnd(event)" title="${escapeHtml(sc.name)}">
                            <i class="fas ${sc.icon}" style="color:#0284c7"></i> 
                            <span style="font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(sc.name)}</span>
                          </div>`;
                });
            }

            if (!h) h = '<p style="grid-column:1/-1;text-align:center;padding:1rem;color:#9ca3af">No matching components found</p>';

            const grid = document.getElementById(targetId);
            if (grid) grid.innerHTML = h;
            return h;
        }
        function renderWebArea(area) {
            const t = STORE.websiteTemplates[currentWebsiteMode] || {};
            const comps = t[area] || [];
            if (!comps.length) return '<p style="text-align:center;color:#9ca3af">Drop components here</p>';
            return comps.map((c, i) => {
                let thumbH = '';
                if (c.type === 'carousel' && c.config?.slides?.[0]?.url) thumbH = `<img src="${c.config.slides[0].url}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;margin-right:0.5rem;border:1px solid #e5e7eb">`;
                else if (c.config?.bgImage) thumbH = `<img src="${c.config.bgImage}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;margin-right:0.5rem;border:1px solid #e5e7eb">`;

                return `<div class="builder-field" style="display:flex;align-items:center;">
                            ${thumbH}
                            <span style="flex:1"><i class="fas ${c.icon || 'fa-cube'}"></i> ${escapeHtml(c.name || c.type)}</span>
                            <div>
                                <button class="btn btn-xs btn-outline" onclick="editComp('${area}',${i})"><i class="fas fa-pencil-alt"></i></button> 
                                <button class="btn btn-xs btn-outline" onclick="moveComp('${area}',${i},'up')">↑</button>
                                <button class="btn btn-xs btn-outline" onclick="moveComp('${area}',${i},'down')">↓</button>
                                <button class="btn btn-xs btn-danger" onclick="removeComp('${area}',${i})">×</button>
                            </div>
                        </div>`;
            }).join('')
        }
        function setWebMode(m) { currentWebsiteMode = m; adminNav('website') }
        let draggedComponentIsSearch = false;
        function wbDragStart(e, type, isDynamicSearch = false) { draggedComponentType = type; draggedComponentIsSearch = isDynamicSearch; e.target.style.opacity = '.5' }
        function wbDragEnd(e) { draggedComponentType = null; draggedComponentIsSearch = false; e.target.style.opacity = '1' }
        function wbDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over') }
        function wbDragLeave(e) { e.currentTarget.classList.remove('drag-over') }
        function wbDrop(e, area, isMinisite = false) {
            e.preventDefault(); e.currentTarget.classList.remove('drag-over');
            if (!draggedComponentType) return;

            let compName = "Dynamic Component", compIcon = "fa-cube";
            if (draggedComponentIsSearch) {
                compName = draggedComponentType.replace('search_', '') + ' Filter';
                compIcon = 'fa-filter';
            } else {
                const allComps = { ...COMPONENTS.header, ...COMPONENTS.body, ...COMPONENTS.footer };
                const comp = allComps[draggedComponentType]; if (!comp) return;
                compName = comp.name;
                compIcon = comp.icon;
            }

            if (isMinisite) {
                const tpl = STORE.minisiteTemplates.find(t => t.id === currentMinisiteTemplateId);
                if (!tpl) return;
                if (!tpl.tierData[currentMinisiteTier]) tpl.tierData[currentMinisiteTier] = { header: [], body: [], footer: [] };
                tpl.tierData[currentMinisiteTier][area].push({ type: draggedComponentType, name: compName, icon: compIcon, config: {} });
                saveStore(); renderMinisiteTemplateManager();
            } else {
                if (!STORE.websiteTemplates[currentWebsiteMode]) STORE.websiteTemplates[currentWebsiteMode] = { header: [], body: [], footer: [] };
                if (!STORE.websiteTemplates[currentWebsiteMode][area]) STORE.websiteTemplates[currentWebsiteMode][area] = [];
                STORE.websiteTemplates[currentWebsiteMode][area].push({ type: draggedComponentType, name: compName, icon: compIcon, config: {} });
                saveStore(); adminNav('website');
            }
            showToast(`Added ${compName}`, 'success');
        }

        // --- Editing Components Admin UI ---
        let editCompContext = { area: null, idx: null, isMinisite: false };

        function _renderCinematicEditor() {
            let c;
            if (editCompContext.isMinisite) {
                const tpl = STORE.minisiteTemplates.find(t => t.id === currentMinisiteTemplateId);
                c = tpl?.tierData[currentMinisiteTier][editCompContext.area][editCompContext.idx];
            } else {
                c = STORE.websiteTemplates[currentWebsiteMode][editCompContext.area][editCompContext.idx];
            }
            if (!c) return;
            let slidesH = '';
            c.config.slides.forEach((sl, i) => {
                const engineOpts = (STORE.searchEngines || []).map(e => `<option value="${e.id}" ${sl.mockEngine === e.id ? 'selected' : ''}>${e.name}</option>`).join('');
                slidesH += `<div style="background:#f9fafb;border:1px solid #e5e7eb;padding:1.25rem;border-radius:.75rem;margin-bottom:1.5rem;position:relative;box-shadow: 0 1px 2px rgba(0,0,0,0.05)">
                    <div style="position:absolute;top:0.75rem;right:0.75rem;display:flex;gap:0.25rem">
                        <button class="btn btn-xs btn-outline" title="Move Up" onclick="_cineMoveSlide(${i}, 'up')"><i class="fas fa-arrow-up"></i></button>
                        <button class="btn btn-xs btn-outline" title="Move Down" onclick="_cineMoveSlide(${i}, 'down')"><i class="fas fa-arrow-down"></i></button>
                        <button class="btn btn-xs btn-danger" title="Remove Slide" onclick="_cineRemoveSlide(${i})"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <div style="font-weight:700;margin-bottom:1rem;color:#D4AF37;display:flex;align-items:center;gap:0.5rem">
                        <span style="background:#D4AF37;color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem">${i + 1}</span>
                        Cinematic Slide
                    </div>
                    <div class="grid-2">
                        <div class="form-group"><label class="form-label">Headline Text</label><input type="text" id="cine_head_${i}" class="form-control" placeholder="e.g. Magical Siwa Stays" value="${escapeHtml(sl.headline || '')}"></div>
                        <div class="form-group"><label class="form-label">Sub-Headline</label><input type="text" id="cine_sub_${i}" class="form-control" placeholder="Short tagline..." value="${escapeHtml(sl.subheadline || '')}"></div>
                    </div>
                    <div class="form-group"><label class="form-label">Media URL (Image/Video)</label><input type="text" id="cine_url_${i}" class="form-control" placeholder="https://..." value="${escapeHtml(sl.mediaUrl || '')}"></div>
                    <div class="grid-2">
                        <div class="form-group" style="margin-bottom:0"><label class="form-label">Routing Destination</label><input type="text" id="cine_target_${i}" class="form-control" placeholder="e.g. http://stayin.siwa.today" value="${escapeHtml(sl.targetLink || '')}"></div>
                        <div class="form-group" style="margin-bottom:0"><label class="form-label">Mock Engine Overlay</label><select id="cine_eng_${i}" class="form-control"><option value="">No Mock Engine</option>${engineOpts}</select></div>
                    </div>
                </div>`;
            });

            showModal('Edit Cinematic Carousel', `
                <div style="margin-bottom:1.5rem; display:flex; justify-content:space-between; align-items:center">
                    <p style="font-size:0.875rem; color:#6b7280">Configure billboard slides with cinematic backgrounds and mock search overlays.</p>
                    <button class="btn btn-primary btn-sm" onclick="_cineAddSlide()"><i class="fas fa-plus"></i> Add Slide</button>
                </div>
                <div id="cineSlidesContainer" style="max-height:50vh;overflow-y:auto;padding-right:0.5rem">
                    ${slidesH || '<div style="padding:3rem;text-align:center;background:#f9fafb;border:2px dashed #e5e7eb;border-radius:1rem;color:#9ca3af"><i class="fas fa-film fa-3x" style="display:block;margin-bottom:1rem;opacity:0.3"></i>No slides added yet.</div>'}
                </div>
            `, () => {
                _cineSyncState();
                closeModal();
                if (editCompContext.isMinisite) saveMinisiteTemplate(); else saveWebsite();
            });
        }

        function _cineSyncState() {
            let c;
            if (editCompContext.isMinisite) {
                const tpl = STORE.minisiteTemplates.find(t => t.id === currentMinisiteTemplateId);
                c = tpl?.tierData[currentMinisiteTier][editCompContext.area][editCompContext.idx];
            } else {
                const t = STORE.websiteTemplates[currentWebsiteMode];
                c = t?.[editCompContext.area]?.[editCompContext.idx];
            }
            if (!c || !c.config.slides) return;

            c.config.slides.forEach((sl, i) => {
                sl.headline = document.getElementById(`cine_head_${i}`)?.value || '';
                sl.subheadline = document.getElementById(`cine_sub_${i}`)?.value || '';
                sl.mediaUrl = document.getElementById(`cine_url_${i}`)?.value || '';
                sl.targetLink = document.getElementById(`cine_target_${i}`)?.value || '';
                sl.mockEngine = document.getElementById(`cine_eng_${i}`)?.value || '';
            });
        }

        function _cineAddSlide() {
            _cineSyncState();
            let c;
            if (editCompContext.isMinisite) {
                const tpl = STORE.minisiteTemplates.find(t => t.id === currentMinisiteTemplateId);
                c = tpl?.tierData[currentMinisiteTier][editCompContext.area][editCompContext.idx];
            } else {
                c = STORE.websiteTemplates[currentWebsiteMode][editCompContext.area][editCompContext.idx];
            }
            c.config.slides.push({ headline: '', subheadline: '', mediaUrl: '', targetLink: '', mockEngine: '' });
            closeModal(); _renderCinematicEditor();
        }

        function _cineRemoveSlide(idx) {
            _cineSyncState();
            let c;
            if (editCompContext.isMinisite) {
                const tpl = STORE.minisiteTemplates.find(t => t.id === currentMinisiteTemplateId);
                c = tpl?.tierData[currentMinisiteTier][editCompContext.area][editCompContext.idx];
            } else {
                c = STORE.websiteTemplates[currentWebsiteMode][editCompContext.area][editCompContext.idx];
            }
            c.config.slides.splice(idx, 1);
            closeModal(); _renderCinematicEditor();
        }

        function _cineMoveSlide(idx, dir) {
            _cineSyncState();
            let c;
            if (editCompContext.isMinisite) {
                const tpl = STORE.minisiteTemplates.find(t => t.id === currentMinisiteTemplateId);
                c = tpl?.tierData[currentMinisiteTier][editCompContext.area][editCompContext.idx];
            } else {
                c = STORE.websiteTemplates[currentWebsiteMode][editCompContext.area][editCompContext.idx];
            }
            if (dir === 'up' && idx > 0) {
                [c.config.slides[idx - 1], c.config.slides[idx]] = [c.config.slides[idx], c.config.slides[idx - 1]];
            } else if (dir === 'down' && idx < c.config.slides.length - 1) {
                [c.config.slides[idx + 1], c.config.slides[idx]] = [c.config.slides[idx], c.config.slides[idx + 1]];
            }
            closeModal(); _renderCinematicEditor();
        }

        function moveComp(area, i, dir) { const t = STORE.websiteTemplates[currentWebsiteMode]; if (!t || !t[area]) return; const a = t[area]; if (dir === 'up' && i > 0) [a[i - 1], a[i]] = [a[i], a[i - 1]]; if (dir === 'down' && i < a.length - 1) [a[i], a[i + 1]] = [a[i + 1], a[i]]; saveStore(); adminNav('website') }
        function removeComp(area, i) { const t = STORE.websiteTemplates[currentWebsiteMode]; if (!t || !t[area]) return; t[area].splice(i, 1); saveStore(); adminNav('website'); showToast('Removed', 'success') }
        function saveWebsite() { saveStore(); addActivity(`Website saved: ${currentWebsiteMode}`); showToast('Website saved!', 'success'); renderApp(); }

        function renderMinisiteTemplateManager() {
            const grid = document.getElementById('minisiteTemplateGrid'); if (!grid) return;
            const parentTypes = getParentTypes();

            // Auto-select first category if none selected
            if (!currentMinisiteCategory && parentTypes.length > 0) {
                currentMinisiteCategory = parentTypes[0].id;
            }

            let h = `<div class="grid-2" style="align-items:start">
                <div>
                    <div class="field-category-title">1. Select Business Category</div>
                    <div class="grid-4" style="gap:.5rem">
                        ${parentTypes.map(p => `
                            <div class="card ${currentMinisiteCategory === p.id ? 'active' : ''}" style="padding:.5rem;cursor:pointer;text-align:center;border:2px solid ${currentMinisiteCategory === p.id ? '#D4AF37' : 'transparent'};transition:all.2s" onclick="setMinisiteCategory('${p.id}')">
                                <i class="${p.icon}" style="color:${p.iconColor};margin-bottom:5px;display:block"></i>
                                <div style="font-size:.65rem;font-weight:600;white-space:nowrap;overflow:hidden">${p.name}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div>
                    <div class="field-category-title">2. Choose or Create Template</div>
                    <div id="tplList" style="display:flex;flex-direction:column;gap:.5rem;max-height:250px;overflow-y:auto;padding:.25rem">
                        ${renderMinisiteTemplateList()}
                    </div>
                    <button class="btn btn-primary" style="width:100%;margin-top:1rem" onclick="promptNewMinisiteTemplate()"><i class="fas fa-plus"></i> Create New ${currentMinisiteCategory ? (getParentTypes().find(p => p.id === currentMinisiteCategory)?.name || '') : ''} Template</button>
                </div>
            </div>`;

            if (currentMinisiteTemplateId) {
                const tpl = STORE.minisiteTemplates.find(t => t.id === currentMinisiteTemplateId);
                h += `
                    <div class="card" style="border:2px solid #D4AF37;background:#fffaf0;margin-top:2rem;box-shadow:0 10px 15px -3px rgba(0,0,0,0.1)">
                        <div class="card-header">
                            <div><i class="fas fa-edit" style="color:#D4AF37"></i> <strong>Template:</strong> ${escapeHtml(tpl.name)}</div>
                            <div class="btn-group" style="background:#f3f4f6;padding:4px;border-radius:.5rem">
                                ${Object.keys(STORE.subscriptionTiers).map(tid => `
                                    <button class="btn btn-xs ${currentMinisiteTier === tid ? 'btn-primary' : 'btn-outline'}" onclick="setMinisiteTier('${tid}')">${STORE.subscriptionTiers[tid].name}</button>
                                `).join('')}
                            </div>
                        </div>
                        <div class="notification-banner" style="background:#fff;border-color:#D4AF37;margin-bottom:1rem"><i class="fas fa-magic"></i> You are designing the <strong>${STORE.subscriptionTiers[currentMinisiteTier].name}</strong> version. Higher tiers can inherit or extend from Free.</div>
                        <div class="grid-2">
                            <div>
                                <div class="drop-zone-label">${STORE.subscriptionTiers[currentMinisiteTier].name} Layout Blocks</div>
                                <div class="dropzone" ondragover="wbDragOver(event)" ondragleave="wbDragLeave(event)" ondrop="wbDrop(event,'header',true)">
                                    <div class="drop-zone-label" style="font-size:.6rem;opacity:.5">Header Slot</div>
                                    ${renderMinisiteTemplateArea('header')}
                                </div>
                                <div class="dropzone" ondragover="wbDragOver(event)" ondragleave="wbDragLeave(event)" ondrop="wbDrop(event,'body',true)" style="min-height:150px;margin-top:.5rem">
                                    <div class="drop-zone-label" style="font-size:.6rem;opacity:.5">Body Content Slot</div>
                                    ${renderMinisiteTemplateArea('body')}
                                </div>
                                <div class="dropzone" ondragover="wbDragOver(event)" ondragleave="wbDragLeave(event)" ondrop="wbDrop(event,'footer',true)" style="margin-top:.5rem">
                                    <div class="drop-zone-label" style="font-size:.6rem;opacity:.5">Footer Slot</div>
                                    ${renderMinisiteTemplateArea('footer')}
                                </div>
                            </div>
                            <div style="background:#fff;padding:1rem;border-radius:.5rem;border:1px solid #e5e7eb">
                                <div class="field-category-title">Widget Library</div>
                                <div class="form-group" style="margin-bottom:0.5rem">
                                    <div style="position:relative">
                                        <i class="fas fa-search" style="position:absolute;left:10px;top:8px;color:#9ca3af;font-size:0.8rem"></i>
                                        <input type="text" class="form-control form-control-sm" placeholder="Search widgets..." style="padding-left:30px;font-size:0.75rem" oninput="renderComponentLibrary(this.value, 'miniCompLibrary')">
                                    </div>
                                </div>
                                <div id="miniCompLibrary" class="grid-2" style="max-height:400px;overflow-y:auto;padding:.25rem;background:#f9fafb;border-radius:.5rem;border:1px solid #e5e7eb">
                                    ${renderComponentLibrary('', 'miniCompLibrary')}
                                </div>
                            </div>
                        </div>
                        <div style="margin-top:1.5rem;display:flex;gap:.5rem;border-top:1px solid #D4AF37;padding-top:1rem">
                            <button class="btn btn-success" onclick="saveMinisiteTemplate()"><i class="fas fa-save"></i> Apply Changes to ${currentMinisiteTier.toUpperCase()}</button>
                            <button class="btn btn-outline" onclick="currentMinisiteTemplateId=null;adminNav('website')">Exit Template Editor</button>
                        </div>
                    </div>`;
            }
            grid.innerHTML = h;
        }

        function renderMinisiteTemplateList() {
            if (!currentMinisiteCategory) return '<p style="text-align:center;color:#9ca3af;font-size:.8rem;padding:1rem">Select a category first</p>';
            const tpls = STORE.minisiteTemplates.filter(t => t.categoryId === currentMinisiteCategory);
            if (!tpls.length) return '<p style="text-align:center;color:#9ca3af;font-size:.8rem;padding:1rem">No templates found for this category</p>';
            return tpls.map(t => `<div class="builder-field ${currentMinisiteTemplateId === t.id ? 'active' : ''}" style="margin:2px 0;cursor:pointer" onclick="editMinisiteTemplate('${t.id}')">
                <i class="fas fa-file-invoice"></i> <strong>${escapeHtml(t.name)}</strong>

        window._addCarSlide = function () { window._carCache.push({ type: 'image', url: '', caption: '', duration: 0, fit: 'cover', pauseSlider: true }); window._renderCarSlides(); };
        window._handleCarUpload = function (e) {
            const file = e.target.files[0]; if (!file) return;
            const idx = parseInt(e.target.dataset.idx);

            if (file.size > 5 * 1024 * 1024) { showToast('File too large (Max 5MB accepted)', 'error'); e.target.value = ''; return; }
            showToast('Compressing media to protect memory limits...', 'success');

            const reader = new FileReader();
            reader.onload = function (ev) {
                if (file.type.startsWith('image/')) {
                    const img = new Image();
                    img.onload = function () {
                        const canvas = document.createElement('canvas');
                        let maxW = 1200, maxH = 1200;
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; } }
                        else { if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; } }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        window._carCache[idx].url = canvas.toDataURL('image/jpeg', 0.75);
                        showToast('High-res media uploaded!', 'success');
                        window._renderCarSlides();
                    };
                    img.src = ev.target.result;
                } else {
                    if (file.size > 1.5 * 1024 * 1024) showToast('Warning: Large video might exceed 5MB localStorage limit completely!', 'error');
                    window._carCache[idx].url = ev.target.result;
                    showToast('Video loaded', 'success');
                    window._renderCarSlides();
                }
            };
            reader.readAsDataURL(file);
        };
        window._handleCompFileUpload = function (e, targetId) {
            const file = e.target.files[0]; if (!file) return;
            if (file.size > 5 * 1024 * 1024) { showToast('File too large (Max 5MB)', 'error'); return; }
            showToast('Compressing image...', 'success');
            const reader = new FileReader();
            reader.onload = function (ev) {
                const img = new Image();
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    let maxW = 2000, maxH = 2000;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; } }
                    else { if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    const b64 = canvas.toDataURL('image/jpeg', 0.9);
                    document.getElementById(targetId).value = b64;
                    const prev = document.getElementById(targetId + '_preview');
                    if (prev) prev.innerHTML = `<img src="${b64}" style="max-height:100px;border-radius:4px">`;
                    showToast('Ready!', 'success');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        function _upGetAllFields(sectionFilter) {
            const allSections = getSectionsForType(_upState.bizTypeId);
            const role = getRoleFromPersona(_upState.personaId);
            const result = [];
            if (!allSections.length) return [];
            for (const s of allSections) {
                if (sectionFilter && s !== sectionFilter) continue;
                const secDef = STORE.sections[s]; if (!secDef) continue;
                const fields = STORE.formTemplates[_upState.bizTypeId]?.[s] || [];
                for (const f of fields) {
                    const canRead = f.acl?.read?.includes(role) || role === 'admin' || (!f.acl && f.permissions?.showOnPublic !== false);
                    const canWrite = (f.acl?.write?.includes(role) || role === 'admin') && (role === 'admin' || secDef.vendorEditable);
                    if (canRead) result.push({ ...f, sectionId: s, sectionName: secDef.name, sectionIcon: secDef.icon, canRead, canWrite });

            return result;

            const data = {};

                const s = inp.dataset.upSec, n = inp.dataset.upField;
                if (!data[s]) data[s] = {};

                else if (inp.type === 'radio') { if (inp.checked) data[s][n] = inp.value; }
                else if (inp.dataset.attr) {
                    if (!data[s][n]) data[s][n] = {};
                    data[s][n][inp.dataset.attr] = inp.value;
                }
                else if (inp.type === 'hidden' && val.startsWith('[')) {
                    try { data[s][n] = JSON.parse(val); } catch(e) { data[s][n] = val; }
                }
                else data[s][n] = val;
            });
            return data;
        }

        async function _handleGalleryUpload(input, secId, fieldName) {
            const files = Array.from(input.files);
            const currentVal = _upGetFeedValue(secId, fieldName);
            const imgs = Array.isArray(currentVal) ? [...currentVal] : (currentVal ? [currentVal] : []);
            
            for (const file of files) {
                const b64 = await toBase64(file);
                imgs.push(b64);
            }

            // Update local STORE draft directly so render works
            if (_upState.feedBizId) {
                const biz = STORE.businesses.find(b => b.id === _upState.feedBizId);
                if (biz) {
                    if (!biz.customData) biz.customData = {};
                    if (!biz.customData[secId]) biz.customData[secId] = {};
                    biz.customData[secId][fieldName] = imgs;
                }
            }
            _upRenderForm(document.getElementById('upBody'));
            _upLiveSync();
        }

        function _removeGalleryImage(secId, fieldName, idx) {
            const currentVal = _upGetFeedValue(secId, fieldName);
            const imgs = Array.isArray(currentVal) ? [...currentVal] : [];
            imgs.splice(idx, 1);
            
            if (_upState.feedBizId) {
                const biz = STORE.businesses.find(b => b.id === _upState.feedBizId);
                if (biz && biz.customData && biz.customData[secId]) {
                    biz.customData[secId][fieldName] = imgs;
                }
            }
            _upRenderForm(document.getElementById('upBody'));
            _upLiveSync();
        }

        let _upSyncTimer = null;
        function _upLiveSync() { clearTimeout(_upSyncTimer); _upSyncTimer = setTimeout(() => { if (_upState.tab === 'card') { const body = document.getElementById('upBody'); if (body) _upRenderCard(body); } }, 400); }

        // Save data collected in the Unified Preview back to the STORE
        function _upSaveData() {
            if (!_upState.feedBizId) {
                showToast('Select a business from "Feed from Business" to save data', 'warning');
                return;
            }
            const biz = STORE.businesses.find(b => b.id === _upState.feedBizId);
            if (!biz) { showToast('Business not found', 'error'); return; }
            const role = getRoleFromPersona(_upState.personaId);
            // Only allow write if persona is admin or vendor with write access
            if (role === 'public') { showToast('Public persona cannot save data', 'error'); return; }
            const collected = _upCollectData();
            if (!biz.customData) biz.customData = {};
            Object.entries(collected).forEach(([secId, fields]) => {
                if (!biz.customData[secId]) biz.customData[secId] = {};
                const secDef = STORE.sections[secId];
                Object.entries(fields).forEach(([fieldName, val]) => {
                    // Enforce write ACL using hierarchical field discovery
                    const allFields = getFieldsForSection(_upState.bizTypeId, secId);
                    const fDef = allFields.find(f => f.name === fieldName);
                    if (!fDef) return;
                    const canWrite = fDef.acl?.write ? (fDef.acl.write.includes(role) || role === 'admin') : (role === 'admin' || (secDef?.vendorEditable && (role === 'vendor' || role === 'salesman')));
                    if (canWrite) biz.customData[secId][fieldName] = val;
                });
            });
            // Moderation flow: if vendor, store as draftData for admin approval
            if (role === 'vendor') {
                if (!biz.draftData) biz.draftData = {};
                Object.entries(collected).forEach(([secId, fields]) => {
                    if (!biz.draftData[secId]) biz.draftData[secId] = {};
                    Object.assign(biz.draftData[secId], fields);
                });
                saveStore();
                addActivity(`Vendor draft saved for: ${biz.name} (via Unified Preview)`);
                showToast('Saved as Draft — pending admin approval', 'warning');
            } else {
                saveStore();
                addActivity(`Data saved via Unified Preview for: ${biz.name} (as ${role})`);
                showToast('Data saved to ' + biz.name + '!', 'success');
            }
        }
