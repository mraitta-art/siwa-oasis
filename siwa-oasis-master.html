        function adminEditBizData(id, personaId = 'admin') {
            const biz = STORE.businesses.find(b => b.id === id); if (!biz) return;
            const role = getRoleFromPersona(personaId);
            const tier = STORE.subscriptionTiers[biz.subscriptionTier || 'free']?.name || 'Free';
            const secs = getSectionsForType(biz.type);

            let h = `<div style="display:flex;justify-content:space-between;align-items:center;">
                        <h3>Editing Data: ${escapeHtml(biz.name)}</h3>
                        <div>
                            <span class="subscription-badge">${tier}</span>
                            <span class="badge badge-${biz.status === 'active' ? 'success' : 'danger'}">${biz.status}</span>
                        </div>
                     </div>
                     <div class="notification-banner" style="background:#f3f4f6; margin-top:1rem;">
                        <i class="fas fa-eye"></i> View As Persona: 
                        <select class="form-control" style="width:250px; display:inline-block; margin-left:1rem;" onchange="adminEditBizData('${id}', this.value)">
                            ${getPersonaSelectorOptions(personaId)}
                        </select>
                     </div>
                     <div class="help-text">Simulating form rendering for: <strong>${role.toUpperCase()}</strong>. Fields will be hidden or locked based on Field ACL.</div>`;

            for (const s of secs) {
                const sec = STORE.sections[s]; if (!sec) continue;
                if (role !== 'admin' && !sec.vendorEditable && role !== 'public') continue;

                const fields = getFieldsForSection(biz.type, s); if (!fields.length) continue;

                const visibleFields = fields.filter(f => {
                    if (role === 'admin') return true;
                    if (!f.acl || !f.acl.read) return f.permissions?.showOnPublic !== false;
                    return f.acl.read.includes(role);
                });

                if (!visibleFields.length) continue;

                h += `<div style="margin-top:1.5rem;border-top:1px solid #e5e7eb;padding-top:1rem"><h4><i class="fas ${sec.icon}"></i> ${sec.name} ${!sec.vendorEditable ? '<span class="badge badge-danger">Admin Only</span>' : '<span class="badge badge-success">Vendor Editable</span>'}</h4>`;
                for (const f of visibleFields) {
                    const val = biz.customData?.[s]?.[f.name] || '';

                    let canWrite = true;
                    if (role !== 'admin') {
                        if (f.acl && f.acl.write) canWrite = f.acl.write.includes(role);
                        else canWrite = role === 'vendor' ? sec.vendorEditable : false;
                    }

                    const attr = canWrite ? '' : 'disabled';
                    const lockBadge = canWrite ? '' : '<span style="font-size:0.7rem; color:#ef4444; margin-left:0.5rem;"><i class="fas fa-lock"></i> Read Only</span>';

                    if (f.type === 'select' && f.options) { h += `<div class="form-group"><label class="form-label${f.required ? ' required' : ''}">${escapeHtml(f.label)} ${lockBadge}</label><select class="form-control" data-section="${s}" data-field="${f.name}" ${attr}>${f.options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('')}</select>${f.helpText ? `<div class="help-text">${escapeHtml(f.helpText)}</div>` : ''}</div>` }
                    else { h += `<div class="form-group"><label class="form-label${f.required ? ' required' : ''}">${escapeHtml(f.label)} ${lockBadge}</label><input type="${f.type === 'number' ? 'number' : 'text'}" class="form-control" data-section="${s}" data-field="${f.name}" value="${escapeHtml(val)}" data-validate='${JSON.stringify(f.validation || {})}' ${attr}>${f.helpText ? `<div class="help-text">${escapeHtml(f.helpText)}</div>` : ''}<div class="invalid-feedback"></div></div>` }
                }
                h += `</div>`;
            }
            document.getElementById('adminContent').innerHTML = h + `<button class="btn btn-primary" style="margin-top:1rem" onclick="adminSaveBizData('${id}')" ${role !== 'admin' ? 'disabled' : ''}>Save All Data</button> <button class="btn btn-success" style="margin-top:1rem" onclick="openUnifiedPreview('${biz.type}',{feedBizId:'${id}'})"><i class="fas fa-desktop"></i> Full Preview</button> <button class="btn btn-outline" style="margin-top:1rem" onclick="adminNav('businesses')">Back</button>`;
        }
        function adminSaveBizData(id) {
            const biz = STORE.businesses.find(b => b.id === id); if (!biz) return;
            if (!biz.customData) biz.customData = {};

            getSectionsForType(biz.type).forEach(s => {
                if (!biz.customData[s]) biz.customData[s] = {};
                getFieldsForSection(biz.type, s).forEach(f => {
                    const inps = document.querySelectorAll(`[data-section="${s}"][data-field="${f.name}"]`);
                    if (inps.length) {
                        if (inps[0].type === 'checkbox') {
                            const values = Array.from(inps).filter(i => i.checked).map(i => i.value);
                            biz.customData[s][f.name] = values;
                        } else if (inps[0].type === 'radio') {
                            const checked = Array.from(inps).find(i => i.checked);
                            biz.customData[s][f.name] = checked ? checked.value : '';
                        } else if (inps.length > 1 || inps[0].dataset.attr) {
                            const obj = {};
                            inps.forEach(i => {
                                if (i.dataset.attr) obj[i.dataset.attr] = i.value;
                                else obj.value = i.value;
                            });
                            biz.customData[s][f.name] = obj;
                        } else {
                            biz.customData[s][f.name] = inps[0].value;
                        }
                    }

        // --- CSV Helper ---
        function downloadCSV(filename, headers, rows) {
            const BOM = '\uFEFF';
            const escape = v => { const s = String(v == null ? '' : v); return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s };
            const csv = BOM + headers.map(escape).join(',') + ('\n') + rows.map(r => r.map(escape).join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
            URL.revokeObjectURL(url);
            addAudit('export', `Exported ${filename}`);
            showToast(`Exported ${filename}`, 'success');
        }

        function exportForUpdate() {
            const typeId = document.getElementById('updateType').value;
            const headers = ['ID', 'Name', 'Type', 'Tier', 'Status', 'Published'];
            const allBiz = typeId ? STORE.businesses.filter(b => b.type === typeId) : STORE.businesses;

            if (!allBiz.length) { showToast('No businesses found in this category', 'error'); return; }

            // Collect all possible headers across the selected businesses
            const sectionMap = new Set();
            allBiz.forEach(b => {
                const secs = getSectionsForType(b.type);
                secs.forEach(sId => {
                    const fields = getFieldsForSection(b.type, sId);
                    fields.forEach(f => sectionMap.add(`${sId}:${f.name}`));
                });
            });

            const dynamicHeaders = Array.from(sectionMap);
            const finalHeaders = [...headers, ...dynamicHeaders];
            const rows = allBiz.map(b => {
                const row = [b.id, b.name, b.type, b.subscriptionTier || 'free', b.status || 'active', b.published ? 'Yes' : 'No'];
                dynamicHeaders.forEach(h => {
                    const [sId, fName] = h.split(':');
                    row.push(b.customData?.[sId]?.[fName] || '');
                });
                return row;
            });

            downloadCSV(`mass-update-export-${typeId || 'all'}.csv`, finalHeaders, rows);
        }

        function triggerImport(mode) {
            const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.csv';
            inp.onchange = e => {
                const reader = new FileReader();

            };

        function processExcelUpsert(csvText, mode) {
            const lines = csvText.split(/\r?\n/).filter(l => l.trim());
            if (lines.length < 2) { showToast('Invalid CSV file', 'error'); return; }

            const headers = parseCSVLine(lines[0]);
            let created = 0, updated = 0, errors = 0;

            for (let i = 1; i < lines.length; i++) {
                const vals = parseCSVLine(lines[i]);
                if (vals.length < 2) continue;

                const row = {};
                headers.forEach((h, idx) => row[h] = vals[idx] || '');

                // 1. Business Identity
                let biz = null;
                if (row.ID) biz = STORE.businesses.find(b => b.id === row.ID);

                if (!biz) {
                    if (mode === 'update' && row.ID) { errors++; continue; } // Update mode requires existing ID
                    biz = { id: 'biz_' + Date.now() + '_' + i, name: row.Name, type: row.Type, subscriptionTier: row.Tier || 'free', status: row.Status || 'active', published: row.Published === 'Yes', createdAt: new Date().toISOString(), customData: {} };
                    STORE.businesses.push(biz);
                    created++;
                } else {
                    biz.name = row.Name || biz.name;
                    biz.type = row.Type || biz.type;
                    biz.subscriptionTier = row.Tier || biz.subscriptionTier;
                    biz.status = row.Status || biz.status;
                    biz.published = row.Published === 'Yes';
                    updated++;
                }

                // 2. Custom Data Resolution (Section:Field headers)
                Object.entries(row).forEach(([h, v]) => {
                    if (h.includes(':')) {
                        const [sId, fName] = h.split(':');
                        if (!biz.customData[sId]) biz.customData[sId] = {};
                        biz.customData[sId][fName] = v;
                    }
                });
            }

            saveStore();
            addAudit('excel_upsert', `${mode.toUpperCase()} completed: ${created} created, ${updated} updated, ${errors} errors`);
            showToast(`${mode.toUpperCase()} Success! Created: ${created}, Updated: ${updated}`, 'success');
            adminNav('datamanager');
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '', inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"' && line[i + 1] === '"') { current += '"'; i++; }
                else if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                else current += char;
            }
            result.push(current.trim());
            return result;
        }

                            });
                        }
                        // Merge sections
                        if (data.sections || data.definitions?.sections) {
                            const src = data.sections || data.definitions?.sections || {};
                            Object.entries(src).forEach(([id, s]) => { if (!STORE.sections[id]) { STORE.sections[id] = { id, ...s }; merged++ } });
                        }
                        // Merge expressions
                        if (data.customExpressions || data.definitions?.customExpressions) {
                            const src = data.customExpressions || data.definitions?.customExpressions || {};
                            Object.entries(src).forEach(([id, e]) => { if (!STORE.customExpressions[id]) { STORE.customExpressions[id] = { id, ...e }; merged++ } });
                        }
                        // Merge policies
                        if (data.searchPolicies) {
                            Object.entries(data.searchPolicies).forEach(([id, p]) => { if (!STORE.searchPolicies[id]) { STORE.searchPolicies[id] = p; merged++ } });
                        }
                        // Merge subscription tiers
                        if (data.subscriptionTiers) {
                            Object.entries(data.subscriptionTiers).forEach(([id, t]) => { if (!STORE.subscriptionTiers[id]) { STORE.subscriptionTiers[id] = t; merged++ } });
                        }
                        // Merge form templates
                        if (data.formTemplates) {
                            Object.entries(data.formTemplates).forEach(([bizId, secs]) => {
                                if (!STORE.formTemplates[bizId]) STORE.formTemplates[bizId] = {};
                                Object.entries(secs).forEach(([secId, fields]) => { if (!STORE.formTemplates[bizId][secId]) { STORE.formTemplates[bizId][secId] = fields; merged++ } });
                            });
                        }
                        saveStore();
                        addAudit('import', `Imported definitions: ${merged} items merged`);
                        addActivity(`Definitions imported: ${merged} new items`);
                        showToast(`Imported! ${merged} new items merged.`, 'success');

                reader.readAsText(e.target.files[0]);
            };
            inp.click();
        }

            const biz = STORE.businesses.find(b => b.id === currentUser.businessId); const c = document.getElementById('vendorContent');
            if (tab === 'profile') {
                c.innerHTML = `<h3>Business Profile</h3><div class="form-group"><label class="form-label">Name</label><input type="text" id="vpName" class="form-control" value="${escapeHtml(biz.name)}"></div><div class="form-group"><label class="form-label">Phone</label><input type="tel" id="vpPhone" class="form-control" value="${escapeHtml(biz.contact?.phone || '')}"></div><div class="form-group"><label class="form-label">Email</label><input type="email" id="vpEmail" class="form-control" value="${escapeHtml(biz.contact?.email || '')}"></div><button class="btn btn-primary" onclick="saveVendorProfile()">Save</button>`;
            } else if (tab === 'sections') {
                const secs = getSectionsForType(biz.type); let h = `<h3>Business Information</h3><div class="help-text">Complete your business details.</div>`;
                for (const s of secs) {
                    const sec = STORE.sections[s]; if (!sec || !sec.vendorEditable) continue; const fields = getFieldsForSection(biz.type, s); if (!fields.length) continue;

                    const visibleFields = fields.filter(f => {
                        if (!f.acl || !f.acl.read) return f.permissions?.showOnPublic !== false;
                        return f.acl.read.includes('vendor');
                    });
                    if (!visibleFields.length) continue;

                    h += `<div style="margin-top:1.5rem;border-top:1px solid #e5e7eb;padding-top:1rem"><h4><i class="fas ${sec.icon}"></i> ${sec.name}</h4>`;
                    for (const f of visibleFields) {
                        const val = biz.customData?.[s]?.[f.name] || '';

                        let canWrite = true;
                        if (f.acl && f.acl.write) canWrite = f.acl.write.includes('vendor');
                        else canWrite = sec.vendorEditable;

                        const attr = canWrite ? '' : 'disabled';
                        const lockBadge = canWrite ? '' : '<span style="font-size:0.7rem; color:#ef4444; margin-left:0.5rem;"><i class="fas fa-lock"></i> Read Only</span>';

                        if (f.type === 'select' && f.options) { h += `<div class="form-group"><label class="form-label${f.required ? ' required' : ''}">${escapeHtml(f.label)} ${lockBadge}</label><select class="form-control" data-section="${s}" data-field="${f.name}" ${attr}>${f.options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('')}</select>${f.helpText ? `<div class="help-text">${escapeHtml(f.helpText)}</div>` : ''}</div>` }
                        else if (f.type === 'multi_attribute' && f.attributes) {
                            const subVals = typeof val === 'object' ? val : {};
                            h += `<div class="form-group"><label class="form-label">${escapeHtml(f.label)} ${lockBadge}</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;background:#f9fafb;padding:.75rem;border-radius:.5rem;border:1px solid #e5e7eb">`;
                            f.attributes.forEach(a => { h += `<div style="font-size:.8rem"><label style="display:block;margin-bottom:.25rem">${escapeHtml(a)}</label><input type="number" min="0" max="10" class="form-control" data-section="${s}" data-field="${f.name}" data-attr="${a}" value="${subVals[a] || 0}" ${attr}></div>` });
                            h += `</div></div>`;
                        }
                        else { h += `<div class="form-group"><label class="form-label${f.required ? ' required' : ''}">${escapeHtml(f.label)} ${lockBadge}</label><input type="${f.type === 'number' ? 'number' : 'text'}" class="form-control" data-section="${s}" data-field="${f.name}" value="${escapeHtml(val)}" data-validate='${JSON.stringify(f.validation || {})}' ${attr}>${f.helpText ? `<div class="help-text">${escapeHtml(f.helpText)}</div>` : ''}<div class="invalid-feedback"></div></div>` }
                    }
                    h += `</div>`;
                }
                c.innerHTML = h + `<button class="btn btn-primary" onclick="saveVendorSections()">Save All</button>`;
            } else if (tab === 'minisite') {
                c.innerHTML = `<h3>Minisite Builder</h3><p>Customize your public page.</p><div class="builder-layout"><div class="field-library"><h4>Components</h4>${Object.entries(COMPONENTS.body).map(([k, v]) => `<div class="field-type" draggable="true" data-comp="${k}" ondragstart="vdStart(event)" ondragend="vdEnd(event)"><i class="fas ${v.icon}"></i> ${v.name}</div>`).join('')}</div><div class="dropzone" id="vendorMiniArea" ondragover="vdOver(event)" ondragleave="vdLeave(event)" ondrop="vdDrop(event)"><p>Drag components here</p></div></div><button class="btn btn-primary" style="margin-top:1rem" onclick="showToast('Minisite saved (demo)','success')">Save Minisite</button>`;
            }
        }
        function saveVendorProfile() { const biz = STORE.businesses.find(b => b.id === currentUser.businessId); if (!biz) return; biz.name = document.getElementById('vpName').value || biz.name; if (!biz.contact) biz.contact = {}; biz.contact.phone = document.getElementById('vpPhone').value; biz.contact.email = document.getElementById('vpEmail').value; saveStore(); addActivity(`Vendor updated: ${biz.name}`); showToast('Saved', 'success') }
        function saveVendorSections() {
            const biz = STORE.businesses.find(b => b.id === currentUser.businessId); if (!biz) return;
            let hasErrors = false;
            document.querySelectorAll('[data-validate]').forEach(inp => {
                const rules = JSON.parse(inp.dataset.validate || '{}'); const errs = Validator.validateField(inp, rules, inp.previousElementSibling?.textContent || 'Field');
                if (errs.length) hasErrors = true;
            });
            if (hasErrors) { showToast('Fix validation errors first', 'error'); return }

            // Staging: Save to draftData instead of customData for Admin Moderation
            if (!biz.draftData) biz.draftData = {};
            getSectionsForType(biz.type).forEach(s => {
                getFieldsForSection(biz.type, s).forEach(f => {
                    const inps = document.querySelectorAll(`[data-section="${s}"][data-field="${f.name}"]`);
                    if (inps.length && !inps[0].disabled) {
                        if (!biz.draftData[s]) biz.draftData[s] = {};

                        if (inps[0].type === 'checkbox') {
                            const values = Array.from(inps).filter(i => i.checked).map(i => i.value);
                            biz.draftData[s][f.name] = values;
                        } else if (inps[0].type === 'radio') {
                            const checked = Array.from(inps).find(i => i.checked);
                            biz.draftData[s][f.name] = checked ? checked.value : '';
                        } else if (inps.length > 1 || inps[0].dataset.attr) {
                            const obj = {};
                            inps.forEach(i => {
                                if (i.dataset.attr) obj[i.dataset.attr] = i.value;
                                else obj.value = i.value;
                            });
                            biz.draftData[s][f.name] = obj;
                        } else {
                            biz.draftData[s][f.name] = inps[0].value;
                        }
                    }
                });
            });

            saveStore();
            addActivity(`Vendor STAGED edits for: ${biz.name}`);
            showToast('Changes sent for Admin Approval', 'success');
            renderApp();
        }
        function vendorReqUpgrade() { const biz = STORE.businesses.find(b => b.id === currentUser.businessId); if (!biz) return; showModal('Request Upgrade', `<div class="form-group"><label>Tier</label><select id="vuTier" class="form-control">${Object.keys(STORE.subscriptionTiers).filter(t => t !== biz.subscriptionTier).map(t => `<option value="${t}">${STORE.subscriptionTiers[t].name}</option>`).join('')}</select></div><div class="form-group"><label>Features (comma)</label><input type="text" id="vuFeat" class="form-control" placeholder="reviews,map"></div>`, () => { STORE.clientRequirements.push({ id: 'req_' + Date.now(), businessId: biz.id, clientName: biz.name, requestedTier: document.getElementById('vuTier').value, requestedFeatures: document.getElementById('vuFeat').value.split(',').reduce((a, f) => { if (f.trim()) a[f.trim()] = true; return a }, {}), status: 'pending', createdAt: new Date().toISOString() }); saveStore(); closeModal(); showToast('Request sent', 'success') }) }
        let vdComp = null;
        function vdStart(e) { vdComp = e.target.closest('[data-comp]')?.dataset.comp }
        function vdEnd(e) { vdComp = null }
        function vdOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over') }
        function vdLeave(e) { e.currentTarget.classList.remove('drag-over') }
        function vdDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); if (!vdComp) return; const ci = COMPONENTS.body[vdComp]; if (!ci) return; const d = document.createElement('div'); d.className = 'builder-field'; d.innerHTML = `<span><i class="fas ${ci.icon}"></i> ${ci.name}</span><button class="btn btn-xs btn-danger" onclick="this.parentElement.remove()">×</button>`; document.getElementById('vendorMiniArea').appendChild(d); showToast('Added ' + ci.name, 'success') }

        // ================================================================
        // MODULE 20: RESET & INITIALIZATION
        // ================================================================
        function resetAllData() {
            if (currentUser.role !== 'admin') { showToast('Only System Administrators can reset data.', 'error'); return; }
            showModal('SECURITY CLEARANCE REQUIRED', `
                <div style="text-align:center;padding:1rem">
                    <i class="fas fa-exclamation-triangle" style="font-size:3rem;color:#dc2626;margin-bottom:1rem"></i>
                    <h3 style="color:#dc2626">DANGER: PLATFORM WIPE</h3>
                    <p style="font-size:.9rem;color:#6b7280">This will permanently delete ALL businesses, vendors, and definitions. This cannot be undone.</p>
                    <div class="form-group" style="margin-top:1.5rem;text-align:left">
                        <label class="form-label required">Confirm Admin Password</label>
                        <input type="password" id="resetPass" class="form-control" placeholder="Type your password to confirm">
                    </div>
                </div>
            `, () => {
                const pass = document.getElementById('resetPass').value;
                if (!pass || btoa(pass) !== currentUser.password) {
                    showToast('Invalid password. Wipe aborted.', 'error');
                    return;
                }
                if (confirm('FINAL WARNING: Are you absolutely sure?')) {
                    localStorage.removeItem('siwa_master_v4');
                    initDefaultData();
                    showToast('Data reset! Refreshing system...', 'success');
                    setTimeout(() => location.reload(), 500);
                }
            });
        }

        // Async initialization to allow cloud sync
        (async function initApp() {
            await loadStore();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            renderApp();
        })();

        function openLightbox(url) {
            const lb = document.createElement('div');
            lb.style = 'position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:10000;display:flex;align-items:center;justify-content:center;cursor:zoom-out;backdrop-filter:blur(10px)';
            lb.innerHTML = `<img src="${url}" style="max-width:90%;max-height:90%;object-fit:contain;box-shadow:0 10px 50px rgba(0,0,0,.5);border-radius:.5rem">`;
            lb.onclick = () => lb.remove();
            document.body.appendChild(lb);
        }

        // Expose functions to HTML onclick handlers
        const globalFns = ['showLoginModal', 'logout', 'renderApp', 'pubDoSearch', 'pubFilterCat', 'viewBizDetail', 'claimBiz', 'adminNav', 'addBizType', 'editBizType', 'delBizType', 'addSection', 'editSection', 'delSection', 'linkSectionToType', 'onFormBizChange', 'onFormSecChange', 'fbDragStart', 'fbDragEnd', 'fbDragOver', 'fbDragLeave', 'fbDrop', 'showAddFieldModal', 'editField', 'dupField', 'delField', 'saveFormFields', 'exportForms', 'importForms', 'onCardBizChange', 'setCardLayout', 'saveCardConfig', 'resetCardConfig', 'renderAdminWebsite', 'setWebMode', 'wbDragStart', 'wbDragEnd', 'wbDragOver', 'wbDragLeave', 'wbDrop', 'moveComp', 'removeComp', 'editComp', '_cineAddSlide', '_cineRemoveSlide', '_cineMoveSlide', '_cineSyncState', 'saveWebsite', 'addPolicy', 'editPolicy', 'delPolicy', 'addTier', 'editTier', 'delTier', 'addExpr', 'editExpr', 'delExpr', 'approveUpgrade', 'rejectUpgrade', 'toggleVendor', 'changeBizTier', 'toggleBizStatus', 'adminEditBizData', 'adminSaveBizData', 'salesmanNewBiz', 'salesmanUpgrade', 'vendorTab', 'saveVendorProfile', 'saveVendorSections', 'vendorReqUpgrade', 'vdStart', 'vdEnd', 'vdOver', 'vdLeave', 'vdDrop', 'resetAllData', 'fullBackup', 'restoreBackup', 'exportExcelBusinesses', 'exportExcelVendors', 'exportExcelPolicies', 'exportExcelDefinitions', 'exportExcelFormTemplates', 'exportExcelSettings', 'exportArchitecture', 'exportStoreSettings', 'importDefinitions', 'importBusinessesCSV', 'openUnifiedPreview', 'closeUnifiedPreview', '_renderUnifiedPreview', '_upRenderBody', '_upFeedBiz', '_upSaveData', '_upLiveSync', '_renderCarSlides', '_addCarSlide', '_handleCarUpload', '_handleCompFileUpload', 'adminSendInvite', 'adminApproveDraft', 'adminRejectDraft', 'renderSystemDefinitions', 'renderPlatformSettings', 'setMinisiteCategory', 'setMinisiteTier', 'editMinisiteTemplate', 'promptNewMinisiteTemplate', 'saveMinisiteTemplate', 'moveMinisiteComp', 'removeMinisiteComp', 'renderMinisiteTemplateManager', 'renderMinisiteTemplateList', 'renderMinisiteTemplateArea', 'openLightbox'];
        globalFns.forEach(fn => { try { window[fn] = eval(fn) } catch (e) { } });
    </script>
