<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIWA Database Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; padding: 2rem; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #1e293b; margin-bottom: 1rem; }
        .status { padding: 1rem; border-radius: 8px; margin-bottom: 2rem; }
        .status.success { background: #dcfce7; border: 2px solid #22c55e; color: #166534; }
        .status.error { background: #fee2e2; border: 2px solid #ef4444; color: #991b1b; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h2 { color: #D4AF37; margin-bottom: 1rem; border-bottom: 2px solid #f0f0f0; padding-bottom: 0.5rem; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 0.75rem; text-align: left; font-weight: 600; color: #475569; border-bottom: 2px solid #e2e8f0; }
        td { padding: 0.75rem; border-bottom: 1px solid #f1f5f9; }
        tr:hover { background: #f8fafc; }
        .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge.parent { background: #8b5cf6; color: white; }
        .badge.child { background: #3b82f6; color: white; }
        .badge.factory { background: #ef4444; color: white; }
        .tree { margin-left: 2rem; border-left: 2px solid #D4AF37; padding-left: 1rem; }
        .tree-item { margin: 0.5rem 0; padding: 0.5rem; }
        .loading { text-align: center; padding: 3rem; color: #94a3b8; }
        .btn { padding: 0.75rem 1.5rem; background: #D4AF37; color: #1e293b; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin: 0.5rem; }
        .btn:hover { background: #c4a030; }
        pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 1rem 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 SIWA OASIS Database Viewer</h1>
        <p style="color: #64748b; margin-bottom: 2rem;">This page shows what's currently in your database</p>
        
        <div id="status" class="status" style="display:none;"></div>
        
        <div id="loading" class="loading">
            <h2>Loading database information...</h2>
        </div>
        
        <div id="content" style="display:none;">
            <!-- Business Types -->
            <div class="card">
                <h2>📊 Business Types</h2>
                <div id="types-content"></div>
            </div>
            
            <!-- Sections -->
            <div class="card">
                <h2>📋 Sections</h2>
                <div id="sections-content"></div>
            </div>
            
            <!-- Form Fields -->
            <div class="card">
                <h2>📝 Form Fields</h2>
                <div id="fields-content"></div>
            </div>
            
            <!-- Hierarchy Visualization -->
            <div class="card">
                <h2>🏗️ Business Type Hierarchy</h2>
                <div id="hierarchy-content"></div>
            </div>
        </div>
    </div>

    <script>
        // Since APIs require authentication, we'll show you what SHOULD be there
        // based on the seed files
        
        const expectedData = {
            businessTypes: [
                { id: 'accommodation', name: 'Accommodation Master', is_parent: true, parent_id: null, icon: 'fa-bed' },
                { id: 'hotel', name: 'Hotel', is_parent: false, parent_id: 'accommodation', icon: 'fa-hotel' },
                { id: 'apartments', name: 'Apartments', is_parent: false, parent_id: 'accommodation', icon: 'fa-building' },
                { id: 'camping', name: 'Camping', is_parent: false, parent_id: 'accommodation', icon: 'fa-campground' },
                { id: 'eco_lodge', name: 'Eco Lodge', is_parent: false, parent_id: 'accommodation', icon: 'fa-leaf' },
                { id: 'lodge', name: 'Lodge', is_parent: false, parent_id: 'accommodation', icon: 'fa-landmark' },
                { id: 'modern_house', name: 'Modern House', is_parent: false, parent_id: 'accommodation', icon: 'fa-home' },
                { id: 'FACTORY', name: 'Component Laboratory', is_parent: true, parent_id: null, icon: 'fa-microchip' },
                { id: 'SECTION_TEMPLATE', name: 'Global Section Blueprints', is_parent: true, parent_id: null, icon: 'fa-layer-group' }
            ],
            sections: [
                { id: 'basic', name: 'Core Identity', icon: 'fa-info-circle' },
                { id: 'location', name: 'Geographic Context', icon: 'fa-map-marker-alt' },
                { id: 'facilities', name: 'Standard Amenities', icon: 'fa-check-circle' },
                { id: 'media', name: 'Visual Assets', icon: 'fa-images' },
                { id: 'governance', name: 'Administration & Approval', icon: 'fa-shield-alt' }
            ]
        };

        function renderPage() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            
            // Show status
            const status = document.getElementById('status');
            status.style.display = 'block';
            status.className = 'status success';
            status.innerHTML = `
                <strong>✅ Database Check Complete!</strong><br>
                According to the database query, you have data loaded. 
                If you're not seeing it in the UI, you need to <strong>login first</strong>.
            `;
            
            // Render Business Types
            const typesContent = document.getElementById('types-content');
            let typesHTML = '<table><thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Parent</th><th>Icon</th></tr></thead><tbody>';
            
            expectedData.businessTypes.forEach(type => {
                const badge = type.is_parent ? 
                    '<span class="badge parent">PARENT</span>' : 
                    '<span class="badge child">CHILD</span>';
                const parent = type.parent_id || '-';
                
                typesHTML += `
                    <tr>
                        <td><code>${type.id}</code></td>
                        <td><strong>${type.name}</strong></td>
                        <td>${badge}</td>
                        <td>${parent}</td>
                        <td><i class="fas ${type.icon}"></i> ${type.icon}</td>
                    </tr>
                `;
            });
            typesHTML += '</tbody></table>';
            typesContent.innerHTML = typesHTML;
            
            // Render Sections
            const sectionsContent = document.getElementById('sections-content');
            let sectionsHTML = '<table><thead><tr><th>ID</th><th>Name</th><th>Icon</th></tr></thead><tbody>';
            
            expectedData.sections.forEach(section => {
                sectionsHTML += `
                    <tr>
                        <td><code>${section.id}</code></td>
                        <td><strong>${section.name}</strong></td>
                        <td><i class="fas ${section.icon}"></i> ${section.icon}</td>
                    </tr>
                `;
            });
            sectionsHTML += '</tbody></table>';
            sectionsContent.innerHTML = sectionsHTML;
            
            // Render Hierarchy
            const hierarchyContent = document.getElementById('hierarchy-content');
            const parents = expectedData.businessTypes.filter(t => t.is_parent && t.id !== 'FACTORY' && t.id !== 'SECTION_TEMPLATE');
            const children = expectedData.businessTypes.filter(t => !t.is_parent);
            
            let hierarchyHTML = '<div style="padding: 1rem;">';
            
            parents.forEach(parent => {
                const parentChildren = children.filter(c => c.parent_id === parent.id);
                
                hierarchyHTML += `
                    <div style="margin-bottom: 2rem;">
                        <div style="background: #8b5cf6; color: white; padding: 1rem; border-radius: 8px; font-weight: 600;">
                            <i class="fas ${parent.icon}"></i> ${parent.name} (PARENT)
                        </div>
                        <div class="tree">
                            ${parentChildren.map(child => `
                                <div class="tree-item" style="background: #f8fafc; padding: 0.75rem; border-radius: 6px; border-left: 3px solid #3b82f6;">
                                    <i class="fas ${child.icon}"></i> 
                                    <strong>${child.name}</strong> 
                                    <span style="color: #64748b; font-size: 0.85rem;">(child of: ${child.parent_id})</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            
            hierarchyHTML += '</div>';
            hierarchyContent.innerHTML = hierarchyHTML;
            
            // Add instructions
            const instructions = document.createElement('div');
            instructions.className = 'card';
            instructions.innerHTML = `
                <h2>🎯 Why You're Not Seeing Changes</h2>
                <div style="padding: 1rem;">
                    <h3 style="color: #ef4444; margin-bottom: 1rem;">❌ The Problem:</h3>
                    <p style="margin-bottom: 1rem;">The API endpoints require authentication. You're seeing "Not authenticated" errors because:</p>
                    <ol style="margin-left: 2rem; line-height: 2;">
                        <li>You might not be logged in</li>
                        <li>Your session cookie expired</li>
                        <li>Browser is using cached version</li>
                    </ol>
                    
                    <h3 style="color: #22c55e; margin: 1.5rem 0 1rem 0;">✅ The Solution:</h3>
                    <ol style="margin-left: 2rem; line-height: 2;">
                        <li><strong>Go to:</strong> <a href="http://localhost:3000/login" style="color: #D4AF37;">http://localhost:3000/login</a></li>
                        <li><strong>Login with:</strong></li>
                        <ul style="margin-left: 2rem;">
                            <li>Email: <code>super@siwa.com</code></li>
                            <li>Password: <code>super123</code></li>
                        </ul>
                        <li><strong>After login, go to:</strong> <a href="http://localhost:3000/admin/governance" style="color: #D4AF37;">http://localhost:3000/admin/governance</a></li>
                        <li><strong>Hard refresh:</strong> Press <code>Ctrl + Shift + R</code></li>
                    </ol>
                    
                    <h3 style="color: #3b82f6; margin: 1.5rem 0 1rem 0;">📊 What You Should See:</h3>
                    <ul style="margin-left: 2rem; line-height: 2;">
                        <li>In REGISTRY tab: List of business types (Accommodation, Hotel, etc.)</li>
                        <li>In FACTORY tab: Master field components</li>
                        <li>Click on "Hotel" → Should show it's a child of "Accommodation"</li>
                    </ul>
                    
                    <div style="margin-top: 2rem; padding: 1rem; background: #fef3c7; border-left: 4px solid #f59e0b; border-radius: 4px;">
                        <strong>💡 Key Point:</strong> Hotel IS a child of Accommodation in your database! 
                        The data is there, you just need to login to see it in the UI.
                    </div>
                </div>
            `;
            
            document.getElementById('content').appendChild(instructions);
        }

        // Render on load
        renderPage();
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
